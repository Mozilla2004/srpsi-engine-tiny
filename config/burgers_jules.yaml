# SRΨ-Engine Tiny: Jules-Optimized Configuration
# Optimized for limited GPU memory

inherit: default.yaml

# Task definition (same as burgers.yaml)
task:
  name: burgers_1d
  nu: 0.01
  domain_size: 2 * pi

# Data generation settings
data_gen:
  ic_type: random
  amp_range: [0.5, 1.5]
  freq_range: [1, 4]
  bump_prob: 0.5

# OPTIMIZED: Training hyperparameters for Jules
training:
  batch_size: 16        # CHANGED: Reduced from 32 to 16 (save memory)
  epochs: 80
  lr: 0.0001
  weight_decay: 1.0e-5
  grad_clip: 0.5
  teacher_forcing_ratio: 1.0
  rollout_training_start_epoch: 20
  rollout_training_ratio: 0.3

# Loss weights (same as default)
loss:
  lambda_cons: 0.1
  lambda_phase: 0.0
  lambda_smooth: 0.02

# Model architecture (same as default)
model:
  hidden_dim: 64
  depth: 3
  kernel_size: 5
  dropout: 0.0

# Evaluation settings (same as default)
eval:
  perturb_shift: 4
  perturb_noise_std: 0.01
  rollout_steps: 32

# Output settings
output:
  log_interval: 10
  save_interval: 20
  plot_interval: 20
